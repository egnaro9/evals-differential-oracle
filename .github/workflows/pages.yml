name: pages

# Publishes the runnable demo to https://egnaro9.github.io/evals-differential-oracle/
#
# src/ is copied verbatim into the site and fetched into Pyodide at run time, so
# the page always executes the code currently on main — no port, no duplicate.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble the demo site
        run: |
          mkdir -p site/src
          cp demo/index.html demo/app.js site/
          cp src/*.py site/src/          # the real source, verbatim
          echo "Shipping $(ls site/src | wc -l) source files to the demo"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
